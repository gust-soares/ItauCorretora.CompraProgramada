services:
  mysql:
    image: mysql:8.0
    container_name: itau_mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: compra_programada_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: itau_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: itau_kafka
    depends_on:
      - zookeeper
    ports:
      - "29092:29092" 
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: .
      dockerfile: src/ItauCorretora.Api/Dockerfile
    container_name: itau_api
    depends_on:
      - mysql
      - kafka
    ports:
      - "7100:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=mysql;Database=compra_programada_db;User=root;Password=rootpassword;Port=3306;
      - B3Settings__CotacoesPath=/app/cotacoes
      - KafkaSettings__BootstrapServers=kafka:9092
    volumes:
      - ./cotacoes:/app/cotacoes

volumes:
  mysql_data: