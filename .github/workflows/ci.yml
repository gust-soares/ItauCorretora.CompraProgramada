name: CI/CD Pipeline - Itau Corretora

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write  

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x 

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Run tests with coverage
        run: >
          dotnet test tests/ItauCorretora.Tests/ItauCorretora.Tests.csproj 
          --configuration Release 
          --results-directory ./TestResults
          /p:CollectCoverage=true 
          /p:CoverletOutputFormat=cobertura 
          /p:Include="[ItauCorretora.*]*"
          /p:Exclude="[ItauCorretora.Tests]*%2c[*]*Migrations.*%2c[ItauCorretora.Infrastructure]ItauCorretora.Infrastructure.Data.*"
          /p:DeterministicSourcePaths=false

      - name: Install ReportGenerator
        run: dotnet tool install -g dotnet-reportgenerator-globaltool

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate HTML coverage report
        run: reportgenerator -reports:**/coverage.cobertura.xml -targetdir:coverage-report -reporttypes:Html

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-report

      - name: Publish coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: "**/coverage.cobertura.xml"
          badge: true
          format: markdown
          hide_complexity: true
          indicators: true
          output: both  

      - name: Add coverage comment on PR
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true  
          path: code-coverage-results.md